sphinx:
  services:
    - image:ada-trainings
  stage: build
  script:
      - make doc_html
  artifacts:
    name: "HTML_doc"
    paths:
      - doc/_build/html/*

check_builds:
  services:
    - image:ada-trainings
  stage: build
  script:
    - alr --version
    - find $HOME -name cache 
    - ls $HOME/.config
    - ls $HOME/.config/alire/*
    - mkdir -p $HOME/.config/alire/cache/dependencies
    - cp -r $HOME/mage_* $HOME/.config/alire/cache/dependencies/
    - export ADAFLAGS="-Werror"
    - make build_solutions
    - make build_problems

check_templates:
  services:
    - image:ada-trainings
  stage: test
  script:
    - cp -r src src.actual
    - make generate
    - diff -rb src.actual src 
